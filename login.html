<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile | Sandesh</title>
<style>
  :root{
    --purple-1:#6a3df5; --purple-2:#8a4dff; --pink-1:#ff5fa2;
    --bg-lav:#f4f1ff; --ink:#1c1533; --muted:#6b6480; --card:#ffffff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Segoe UI', Arial, sans-serif; color:var(--ink);
    background:linear-gradient(135deg,#ede7ff,#fff0f6); min-height:100vh;
  }

  /* ===== Top bar ===== */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; background:rgba(255,255,255,.9); backdrop-filter:blur(8px);
    border-bottom:1px solid #eee5ff; position:sticky; top:0; z-index:50;
  }
  .brand{display:flex; align-items:center; gap:10px; font-weight:800; font-size:1.2em; text-decoration:none; color:var(--ink);}
  .brand img{width:28px; height:28px; object-fit:contain; display:inline-block;}
  .menu-wrap{position:relative;}
  .icon-btn{
    width:38px; height:38px; border-radius:50%; border:none; background:#f4f1ff; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:1.1em; color:var(--purple-1);
  }
  .dropdown-menu{
    position:absolute; top:46px; right:0; background:#fff; border-radius:14px;
    box-shadow:0 14px 34px rgba(90,50,180,.2); padding:8px; min-width:170px; z-index:60;
    display:none; flex-direction:column;
  }
  .dropdown-menu.open{display:flex;}
  .dropdown-menu button, .dropdown-menu a{
    background:none; border:none; text-align:left; padding:10px 14px; border-radius:10px;
    font-size:.9em; font-weight:600; color:var(--ink); cursor:pointer; text-decoration:none; display:block;
  }
  .dropdown-menu button:hover, .dropdown-menu a:hover{background:#f4f1ff; color:var(--purple-1);}

  /* ===== Profile ===== */
  .wrap{display:flex; flex-direction:column; align-items:center; padding:50px 20px 100px;}
  .profile-card{
    background:#fff; border-radius:24px; padding:40px 32px; text-align:center;
    box-shadow:0 14px 40px rgba(90,50,180,.12); width:100%; max-width:400px;
  }
  .profile-card img{
    width:130px; height:130px; border-radius:50%; object-fit:cover; margin:0 auto 18px;
    border:4px solid #eee6ff; box-shadow:0 10px 20px rgba(90,50,180,.15); display:block;
  }
  .avatar-fallback{
    width:130px; height:130px; border-radius:50%; margin:0 auto 18px;
    background:linear-gradient(135deg,var(--purple-2),var(--pink-1)); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:2.6em; font-weight:700;
  }
  .profile-card h2{margin:0 0 4px; font-size:1.4em;}
  .profile-card .handle{color:var(--muted); margin-bottom:0;}

  .btn-edit{
    width:100%; max-width:400px; padding:13px; border-radius:14px; border:none; font-weight:700; font-size:.95em; cursor:pointer;
    background:linear-gradient(135deg,var(--purple-1),var(--pink-1)); color:#fff; margin-top:22px;
    box-shadow:0 10px 24px rgba(122,61,245,.3); transition:.25s;
  }
  .btn-edit:hover{transform:translateY(-2px);}

  .details-card{
    background:#fff; border-radius:20px; padding:8px 0; width:100%; max-width:400px; margin-top:20px;
    box-shadow:0 10px 30px rgba(90,50,180,.08);
  }
  .detail-row{
    display:flex; align-items:center; gap:14px; padding:16px 22px; border-bottom:1px solid #f2eefa;
  }
  .detail-row:last-child{border-bottom:none;}
  .detail-row .icon{font-size:1.2em; width:24px; text-align:center;}
  .detail-row .label{font-size:.75em; color:var(--muted); text-transform:uppercase; letter-spacing:.5px;}
  .detail-row .value{font-size:.98em; font-weight:600; color:var(--ink);}

  .back-link{display:block; text-align:center; margin-top:24px; font-size:.9em; color:var(--purple-1); font-weight:700; text-decoration:none;}
  .status-msg{text-align:center; color:var(--muted); padding:40px; font-size:.9em;}

  /* ===== Bottom tabs, matches the gradient theme ===== */
  .bottom-tabs{
    position:fixed; bottom:0; left:0; right:0; display:flex; background:#fff;
    border-top:1px solid #eee5ff; padding:8px 0 4px; box-shadow:0 -6px 20px rgba(90,50,180,.06);
  }
  .bottom-tabs a{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--muted); text-decoration:none; font-size:.8em; font-weight:600; padding:6px 0;
  }
  .bottom-tabs a.active{color:var(--purple-1);}
  .bottom-tabs a .tab-icon{font-size:1.3em;}
  .bottom-tabs a.active .tab-icon{
    background:#f2ecff; padding:6px 16px; border-radius:20px;
  }

  /* ===== Edit Profile Modal ===== */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,10,40,.45); display:none;
    align-items:center; justify-content:center; z-index:100; padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:#fff; border-radius:22px; padding:32px 28px; width:100%; max-width:360px;
    box-shadow:0 24px 60px rgba(0,0,0,.25);
  }
  .modal-box h3{margin:0 0 20px; text-align:center;}
  .modal-photo-wrap{display:flex; justify-content:center; margin-bottom:20px;}
  .modal-photo-circle{
    width:90px; height:90px; border-radius:50%; background:#f4f1ff; border:2px dashed #cdbdf7;
    display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden;
    color:var(--purple-1); font-size:.75em; text-align:center;
  }
  .modal-photo-circle img{width:100%; height:100%; object-fit:cover;}
  .modal-box label{display:block; font-size:.8em; font-weight:700; color:var(--muted); margin-bottom:6px;}
  .modal-box input{
    width:100%; padding:11px 14px; border:1.5px solid #e3ddf5; border-radius:12px;
    margin-bottom:16px; font-size:.92em; outline:none;
  }
  .modal-box input:focus{border-color:var(--purple-1);}
  .modal-actions{display:flex; gap:10px;}
  .modal-actions button{flex:1; padding:11px; border-radius:12px; border:none; font-weight:700; cursor:pointer;}
  .modal-cancel{background:#f4f1ff; color:var(--ink);}
  .modal-save{background:linear-gradient(135deg,var(--purple-1),var(--pink-1)); color:#fff;}
</style>
</head>
<body>

  <div class="topbar">
    <a href="chat.html" class="brand"><img src="logo.png" alt="Sandesh"> Sandesh</a>
    <div class="menu-wrap">
      <button class="icon-btn" id="menuBtn">⋮</button>
      <div class="dropdown-menu" id="dropdownMenu">
        <a href="settings.html">⚙️ Settings</a>
        <button id="logoutBtn">⏻ Logout</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="profile-card" id="profileCard" style="display:none;">
      <img id="myAvatar" src="" alt="" style="display:none;">
      <div id="avatarFallback" class="avatar-fallback">?</div>
      <h2 id="myName">—</h2>
      <div class="handle" id="myHandle">@username</div>
    </div>

    <button class="btn-edit" id="editProfileBtn" style="display:none;">Edit Profile</button>

    <div class="details-card" id="detailsCard" style="display:none;">
      <div class="detail-row">
        <span class="icon">📧</span>
        <div><div class="label">Email</div><div class="value" id="myEmail">—</div></div>
      </div>
      <div class="detail-row">
        <span class="icon">📱</span>
        <div><div class="label">Phone</div><div class="value" id="myPhone">Not added</div></div>
      </div>
      <div class="detail-row">
        <span class="icon">📝</span>
        <div><div class="label">Bio</div><div class="value" id="myBio">Not added</div></div>
      </div>
    </div>

    <a href="chat.html" class="back-link" id="backLink" style="display:none;">← Back to Chat</a>
    <div class="status-msg" id="statusMsg">Loading profile…</div>
  </div>

  <div class="bottom-tabs">
    <a href="chat.html"><span class="tab-icon">💬</span>Chat</a>
    <a href="profile.html" class="active"><span class="tab-icon">👤</span>Profile</a>
  </div>

  <!-- ===== Edit Profile Modal ===== -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-box">
      <h3>Edit Profile</h3>
      <div class="modal-photo-wrap">
        <label class="modal-photo-circle" for="editPhotoInput">
          <img id="editPhotoPreview" src="" alt="" style="display:none;">
          <span id="editPhotoPlaceholder">📷<br><small>Change Photo</small></span>
        </label>
        <input type="file" id="editPhotoInput" accept="image/*" style="display:none;">
      </div>
      <label>Full Name</label>
      <input type="text" id="editNameInput" placeholder="Your name">
      <label>Username</label>
      <input type="text" id="editUsernameInput" placeholder="username (without @)">
      <label>Phone</label>
      <input type="tel" id="editPhoneInput" placeholder="e.g. 9876543210">
      <label>Bio</label>
      <input type="text" id="editBioInput" placeholder="A short line about you">
      <div class="modal-actions">
        <button class="modal-cancel" id="editCancelBtn">Cancel</button>
        <button class="modal-save" id="editSaveBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- ===== UI-only logic (menu + modal open/close) — works even without a server ===== -->
  <script>
    const menuBtn = document.getElementById('menuBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    menuBtn.onclick = (e) => { e.stopPropagation(); dropdownMenu.classList.toggle('open'); };
    document.addEventListener('click', () => dropdownMenu.classList.remove('open'));

    const editModal = document.getElementById('editModal');
    document.getElementById('editCancelBtn').onclick = () => editModal.classList.remove('open');

    const editPhotoInput = document.getElementById('editPhotoInput');
    const editPhotoPreview = document.getElementById('editPhotoPreview');
    const editPhotoPlaceholder = document.getElementById('editPhotoPlaceholder');
    editPhotoInput.addEventListener('change', () => {
      const file = editPhotoInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        editPhotoPreview.src = e.target.result;
        editPhotoPreview.style.display = 'block';
        editPhotoPlaceholder.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });
  </script>

  <!-- ===== Firebase (requires the file to be served over http/https, not opened directly) ===== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, doc, getDoc, setDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getStorage, ref, uploadBytes, getDownloadURL, deleteObject
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
    // =========================================================
    // 🔧 PASTE YOUR FIREBASE CONFIG HERE — must match login.html / chat.html
    // =========================================================
        const firebaseConfig = {
      apiKey: "AIzaSyBE0CmXkQr_LV1YU7y1MpkKUrCr_i9ZD9E",
      authDomain: "sandesh-ff5ff.firebaseapp.com",
      databaseURL: "https://sandesh-ff5ff-default-rtdb.firebaseio.com",
      projectId: "sandesh-ff5ff",
      storageBucket: "sandesh-ff5ff.firebasestorage.app",
      messagingSenderId: "642211479662",
      appId: "1:642211479662:web:1eb6f4d34a61d076b3a67f",
      measurementId: "G-40WGJPN5ND"
    };

    let app, auth, db, storage;
    try{
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      storage = getStorage(app);
    }catch(err){
      document.getElementById('statusMsg').textContent = "⚠️ Firebase isn't connected yet — paste your config in profile.html.";
      console.error(err);
    }

    let currentUser = null;
    let currentProfileData = {};

    function initials(name){
      return (name || '?').trim().split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    }

    // Appends a cache-busting query param so the browser always re-fetches the
    // photo instead of showing a stale cached copy of the same URL.
    function withCacheBuster(url){
      if (!url) return url;
      const sep = url.includes('?') ? '&' : '?';
      return url + sep + 'v=' + Date.now();
    }

    async function loadProfile(){
      try{
        const snap = await getDoc(doc(db, "users", currentUser.uid));
        const data = snap.exists() ? snap.data() : {};
        currentProfileData = data;

        document.getElementById('myName').textContent = data.name || currentUser.displayName || 'Unknown';
        document.getElementById('myHandle').textContent = '@' + (data.username || 'user');
        document.getElementById('myEmail').textContent = data.email || currentUser.email || '—';
        document.getElementById('myPhone').textContent = data.phone || 'Not added';
        document.getElementById('myBio').textContent = data.bio || 'Not added';

        const avatarEl = document.getElementById('myAvatar');
        const fallbackEl = document.getElementById('avatarFallback');
        const myPhoto = data.imageurl || data.photoURL;
        if (myPhoto){
          avatarEl.src = withCacheBuster(myPhoto);
          avatarEl.style.display = 'block';
          fallbackEl.style.display = 'none';
        } else {
          fallbackEl.textContent = initials(data.name || currentUser.displayName);
          fallbackEl.style.display = 'flex';
          avatarEl.style.display = 'none';
        }

        document.getElementById('statusMsg').style.display = 'none';
        document.getElementById('profileCard').style.display = 'block';
        document.getElementById('editProfileBtn').style.display = 'block';
        document.getElementById('detailsCard').style.display = 'block';
        document.getElementById('backLink').style.display = 'block';
      }catch(err){
        console.error(err);
        document.getElementById('statusMsg').textContent = "Could not load profile. Check your Firebase config / Firestore rules.";
      }
    }

    onAuthStateChanged(auth, (user) => {
      if (!user){
        window.location.href = "login.html";
        return;
      }
      currentUser = user;
      loadProfile();
    });

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(()=> window.location.href = "login.html");

    // ---- Edit Profile ----
    document.getElementById('editProfileBtn').onclick = () => {
      document.getElementById('editNameInput').value = currentProfileData.name || '';
      document.getElementById('editUsernameInput').value = currentProfileData.username || '';
      document.getElementById('editPhoneInput').value = currentProfileData.phone || '';
      document.getElementById('editBioInput').value = currentProfileData.bio || '';
      const existingPhoto = currentProfileData.imageurl || currentProfileData.photoURL;
      if (existingPhoto){
        editPhotoPreview.src = withCacheBuster(existingPhoto);
        editPhotoPreview.style.display = 'block';
        editPhotoPlaceholder.style.display = 'none';
      } else {
        editPhotoPreview.style.display = 'none';
        editPhotoPlaceholder.style.display = 'block';
      }
      editPhotoInput.value = '';
      editModal.classList.add('open');
    };

    document.getElementById('editSaveBtn').onclick = async () => {
      const saveBtn = document.getElementById('editSaveBtn');
      const name = document.getElementById('editNameInput').value.trim();
      const username = document.getElementById('editUsernameInput').value.trim().replace(/^@/, '');
      const phone = document.getElementById('editPhoneInput').value.trim();
      const bio = document.getElementById('editBioInput').value.trim();
      if (!name || !username){ alert("Name and username can't be empty."); return; }

      saveBtn.disabled = true; saveBtn.textContent = "Saving...";
      try{
        // "imageurl" matches the field name your mobile app uses in Firestore
        let imageurl = currentProfileData.imageurl || currentProfileData.photoURL || "";
        const file = editPhotoInput.files[0];
        const oldImageurl = currentProfileData.imageurl || "";

        if (file){
          // IMPORTANT: use a unique file name for every upload (instead of always
          // overwriting profile_photos/{uid}.jpg). Overwriting the same path keeps
          // the same download-token URL, so browsers cache the OLD photo and it
          // never visually updates even though the file itself changed. A unique
          // name guarantees a brand-new URL every time.
          const photoRef = ref(storage, `profile_photos/${currentUser.uid}_${Date.now()}.jpg`);
          await uploadBytes(photoRef, file);
          imageurl = await getDownloadURL(photoRef);

          // Best-effort cleanup of the previous photo so storage doesn't pile up.
          // Only attempt this for our own uniquely-named files (not old app-style paths).
          if (oldImageurl && oldImageurl.includes(`profile_photos%2F${currentUser.uid}_`)){
            try{
              const oldPath = decodeURIComponent(oldImageurl.split('/o/')[1].split('?')[0]);
              await deleteObject(ref(storage, oldPath));
            }catch(cleanupErr){
              console.warn("Could not clean up old profile photo:", cleanupErr);
            }
          }
        }

        await setDoc(doc(db, "users", currentUser.uid), { name, username, phone, bio, imageurl }, { merge: true });
        currentProfileData = { ...currentProfileData, name, username, phone, bio, imageurl };
        await loadProfile();
        editModal.classList.remove('open');
      }catch(err){
        console.error(err);
        alert("Could not save profile. Check your Firebase config / Storage rules.");
      }finally{
        saveBtn.disabled = false; saveBtn.textContent = "Save";
      }
    };
  </script>

</body>
</html>
