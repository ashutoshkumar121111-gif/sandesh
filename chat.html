<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandesh Web | Chat</title>
<style>
  :root{
    --purple-1:#6a3df5; --purple-2:#8a4dff; --pink-1:#ff5fa2;
    --bg-lav:#f4f1ff; --ink:#1c1533; --muted:#6b6480; --card:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{height:100%; margin:0;}
  body{font-family:'Segoe UI', Arial, sans-serif; color:var(--ink); background:var(--bg-lav); display:flex; flex-direction:column;}

  .app{display:flex; flex:1; min-height:0;}

  /* ===== Sidebar ===== */
  .sidebar{
    width:340px; background:#fff; border-right:1px solid #eee5ff;
    display:flex; flex-direction:column; flex-shrink:0;
  }
  .sidebar-header{
    padding:18px 20px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid #eee5ff;
  }
  .brand{display:flex; align-items:center; gap:8px; font-weight:800;}
  .brand img{width:28px; height:28px; object-fit:contain;}
  .icon-btn{
    width:36px; height:36px; border-radius:50%; border:none; background:#f4f1ff; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:1em; color:var(--purple-1);
  }
  .search-box{padding:14px 20px;}
  .search-box input{
    width:100%; padding:10px 14px; border-radius:20px; border:1.5px solid #e3ddf5;
    outline:none; font-size:.9em;
  }
  .search-box input:focus{border-color:var(--purple-1);}
  .contact-list{flex:1; overflow-y:auto;}
  .contact{
    display:flex; align-items:center; gap:12px; padding:12px 20px; cursor:pointer; transition:.15s;
    border-left:3px solid transparent;
  }
  .contact:hover{background:#f8f6ff;}
  .contact.active{background:#f2ecff; border-left-color:var(--purple-1);}
  .avatar{
    width:44px; height:44px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700;
    background:linear-gradient(135deg,var(--purple-2),var(--pink-1)); position:relative;
  }
  .avatar .dot{
    position:absolute; bottom:0; right:0; width:11px; height:11px; border-radius:50%;
    background:#ccc; border:2px solid #fff;
  }
  .avatar .dot.online{background:#22c07a;}
  .contact-meta{flex:1; min-width:0;}
  .contact-meta .name{font-weight:700; font-size:.92em;}
  .contact-meta .last-msg{font-size:.8em; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .contact-time{font-size:.72em; color:#b3aecb;}

  /* ===== Chat panel ===== */
  .chat-panel{flex:1; display:flex; flex-direction:column; min-width:0;}
  .chat-panel-header{
    padding:16px 26px; background:#fff; border-bottom:1px solid #eee5ff;
    display:flex; align-items:center; gap:12px;
  }
  .chat-panel-header .name{font-weight:800;}
  .chat-panel-header .status{font-size:.78em; color:var(--muted);}
  .messages{
    flex:1; overflow-y:auto; padding:26px; display:flex; flex-direction:column; gap:10px;
    background:linear-gradient(180deg,#faf8ff,#f4f1ff);
  }
  .bubble{
    max-width:60%; padding:10px 16px; border-radius:16px; font-size:.92em; line-height:1.4;
    word-wrap:break-word;
  }
  .bubble.theirs{background:#fff; align-self:flex-start; border-bottom-left-radius:4px; box-shadow:0 2px 8px rgba(90,50,180,.06);}
  .bubble.mine{
    background:linear-gradient(135deg,var(--purple-1),var(--pink-1)); color:#fff;
    align-self:flex-end; border-bottom-right-radius:4px;
  }
  .bubble .time{display:block; font-size:.68em; opacity:.7; margin-top:4px;}

  .message-input{
    display:flex; gap:10px; padding:16px 20px; background:#fff; border-top:1px solid #eee5ff;
  }
  .message-input input{
    flex:1; padding:12px 18px; border-radius:24px; border:1.5px solid #e3ddf5; outline:none; font-size:.92em;
  }
  .message-input input:focus{border-color:var(--purple-1);}
  .send-btn{
    width:46px; height:46px; border-radius:50%; border:none; cursor:pointer;
    background:linear-gradient(135deg,var(--purple-1),var(--pink-1)); color:#fff; font-size:1.1em;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .empty-state{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--muted); gap:10px; text-align:center; padding:20px;
  }
  .empty-state .big{font-size:3em;}

  @media (max-width:800px){
    .sidebar{position:absolute; z-index:10; height:100%; width:100%; transform:translateX(0); transition:.3s;}
    .sidebar.hide{transform:translateX(-100%);}
    .chat-panel{width:100%;}
    .back-btn{display:inline-flex !important;}
  }
  .back-btn{display:none; align-items:center; justify-content:center;}

  .menu-wrap{position:relative;}
  .dropdown-menu{
    position:absolute; top:44px; right:0; background:#fff; border-radius:14px;
    box-shadow:0 14px 34px rgba(90,50,180,.2); padding:8px; min-width:160px; z-index:50;
    display:none; flex-direction:column;
  }
  .dropdown-menu.open{display:flex;}
  .dropdown-menu button{
    background:none; border:none; text-align:left; padding:10px 14px; border-radius:10px;
    font-size:.9em; font-weight:600; color:var(--ink); cursor:pointer;
  }
  .dropdown-menu button:hover{background:#f4f1ff; color:var(--purple-1);}

  /* ===== Profile view ===== */
  .profile-view{
    flex:1; display:none; flex-direction:column; align-items:center; padding:50px 20px;
    background:linear-gradient(180deg,#faf8ff,#f4f1ff);
  }
  .profile-view.active{display:flex;}
  .profile-card{
    background:#fff; border-radius:24px; padding:36px 30px; text-align:center;
    box-shadow:0 14px 34px rgba(90,50,180,.1); width:100%; max-width:340px;
  }
  .profile-card img{
    width:110px; height:110px; border-radius:50%; object-fit:cover; margin-bottom:16px;
    border:4px solid #eee6ff;
  }
  .profile-card h2{margin:0 0 4px;}
  .profile-card .handle{color:var(--muted); margin-bottom:20px;}
  .profile-card .btn-edit{
    width:100%; padding:12px; border-radius:14px; border:none; font-weight:700; cursor:pointer;
    background:linear-gradient(135deg,var(--purple-1),var(--pink-1)); color:#fff;
  }
  .bottom-tabs{
    display:flex; background:#fff;
    border-top:1px solid #eee5ff; padding:8px 0 4px; flex-shrink:0;
  }
  .bottom-tabs a{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    color:var(--muted); text-decoration:none; font-size:.8em; font-weight:600; padding:6px 0;
  }
  .bottom-tabs a.active{color:var(--purple-1);}
  .bottom-tabs a .tab-icon{font-size:1.3em;}
  .bottom-tabs a.active .tab-icon{
    background:#f2ecff; padding:6px 16px; border-radius:20px;
  }

  /* ===== Edit Profile Modal ===== */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,10,40,.45); display:none;
    align-items:center; justify-content:center; z-index:100; padding:20px;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:#fff; border-radius:22px; padding:32px 28px; width:100%; max-width:360px;
    box-shadow:0 24px 60px rgba(0,0,0,.25);
  }
  .modal-box h3{margin:0 0 20px; text-align:center;}
  .modal-photo-wrap{display:flex; justify-content:center; margin-bottom:20px;}
  .modal-photo-circle{
    width:90px; height:90px; border-radius:50%; background:#f4f1ff; border:2px dashed #cdbdf7;
    display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden;
    color:var(--purple-1); font-size:.75em; text-align:center;
  }
  .modal-photo-circle img{width:100%; height:100%; object-fit:cover;}
  .modal-box label{display:block; font-size:.8em; font-weight:700; color:var(--muted); margin-bottom:6px;}
  .modal-box input{
    width:100%; padding:11px 14px; border:1.5px solid #e3ddf5; border-radius:12px;
    margin-bottom:16px; font-size:.92em; outline:none;
  }
  .modal-box input:focus{border-color:var(--purple-1);}
  .modal-actions{display:flex; gap:10px;}
  .modal-actions button{
    flex:1; padding:11px; border-radius:12px; border:none; font-weight:700; cursor:pointer;
  }
  .modal-cancel{background:#f4f1ff; color:var(--ink);}
  .modal-save{background:linear-gradient(135deg,var(--purple-1),var(--pink-1)); color:#fff;}
</style>
</head>
<body>

  <div class="app">
    <!-- ===== Sidebar ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="#" class="brand"><img src="logo.png" alt="Sandesh"> Sandesh</a>
        <div class="menu-wrap">
          <button class="icon-btn" id="menuBtn" title="Menu">⋮</button>
          <div class="dropdown-menu" id="dropdownMenu">
            <button onclick="window.location.href='profile.html'">👤 Profile</button>
            <button id="settingsBtn">⚙️ Settings</button>
            <button id="logoutBtn">⏻ Logout</button>
          </div>
        </div>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search people...">
      </div>
      <div class="contact-list" id="contactList">
        <!-- contacts populated by JS -->
      </div>

      <!-- Chat / Profile switch, sits at the bottom of the sidebar -->
      <div class="bottom-tabs" id="bottomTabs">
        <a href="javascript:void(0)" class="active" id="tabChatBtn"><span class="tab-icon">💬</span>Chat</a>
        <a href="profile.html" id="tabProfileBtn"><span class="tab-icon">👤</span>Profile</a>
      </div>
    </aside>

    <!-- ===== Chat Panel ===== -->
    <main class="chat-panel">
      <div id="emptyState" class="empty-state">
        <div class="big">💬</div>
        <div><strong>Select a conversation</strong><br>Pick someone from the list to start chatting.</div>
      </div>

      <div id="activeChat" style="display:none; flex-direction:column; height:100%;">
        <div class="chat-panel-header">
          <button class="icon-btn back-btn" id="backBtn">←</button>
          <div class="avatar" id="chatAvatar">?</div>
          <div>
            <div class="name" id="chatName">—</div>
            <div class="status" id="chatStatus">offline</div>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="message-input">
          <input type="text" id="messageInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()">
          <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
      </div>

      <!-- ===== Profile View ===== -->
      <div id="profileView" class="profile-view">
        <div class="profile-card">
          <img id="myAvatar" src="" alt="Profile Photo" onerror="this.style.display='none'">
          <h2 id="myName">—</h2>
          <div class="handle" id="myHandle">@username</div>
          <button class="btn-edit" id="editProfileBtn">Edit Profile</button>
        </div>
      </div>
    </main>
  </div>

  <!-- ===== Edit Profile Modal ===== -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-box">
      <h3>Edit Profile</h3>
      <div class="modal-photo-wrap">
        <label class="modal-photo-circle" for="editPhotoInput">
          <img id="editPhotoPreview" src="" alt="" style="display:none;">
          <span id="editPhotoPlaceholder">📷<br><small>Change Photo</small></span>
        </label>
        <input type="file" id="editPhotoInput" accept="image/*" style="display:none;">
      </div>
      <label>Full Name</label>
      <input type="text" id="editNameInput" placeholder="Your name">
      <label>Username</label>
      <input type="text" id="editUsernameInput" placeholder="username (without @)">
      <div class="modal-actions">
        <button class="modal-cancel" id="editCancelBtn">Cancel</button>
        <button class="modal-save" id="editSaveBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- ===== UI-only logic (menu, tabs, modal) — works even without a server ===== -->
  <script>
    // Shared state (also used/updated by the Firebase module script below)
    let currentUser = null;
    let activeChatId = null;
    let activeContact = null;
    let unsubscribeMessages = null;
    let currentProfileData = {};

    function initials(name){
      return (name || '?').trim().split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    }

    // Renders a real profile photo if the user doc has one (checks a few common
    // field names in case your mobile app uses a different key), otherwise falls
    // back to colored initials.
    function avatarInnerHtml(user){
      const photo = user.photoURL || user.photoUrl || user.profileImage || user.avatar || user.image;
      if (photo){
        return `<img src="${photo}" alt="" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
      }
      return initials(user.name);
    }

    // ---- 3-dot dropdown menu ----
    const menuBtn = document.getElementById('menuBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    menuBtn.onclick = (e) => { e.stopPropagation(); dropdownMenu.classList.toggle('open'); };
    document.addEventListener('click', () => dropdownMenu.classList.remove('open'));

    document.getElementById('settingsBtn').onclick = () => window.location.href = 'settings.html';

    document.getElementById('backBtn').onclick = () => {
      document.getElementById('sidebar').classList.remove('hide');
      document.getElementById('activeChat').style.display = 'none';
      document.getElementById('emptyState').style.display = 'flex';
    };

    // ---- Show/hide Chat vs Profile views ----
    function showChatView(){
      document.getElementById('profileView').classList.remove('active');
      document.getElementById('sidebar').style.display = 'flex';
      document.getElementById('emptyState').style.display = activeChatId ? 'none' : 'flex';
      document.getElementById('activeChat').style.display = activeChatId ? 'flex' : 'none';
      document.getElementById('tabChatBtn')?.classList.add('active');
      document.getElementById('tabProfileBtn')?.classList.remove('active');
    }
    document.getElementById('tabChatBtn').onclick = showChatView;

    // ---- Edit Profile modal (open/cancel/photo preview are pure UI) ----
    const editModal = document.getElementById('editModal');
    const editPhotoInput = document.getElementById('editPhotoInput');
    const editPhotoPreview = document.getElementById('editPhotoPreview');
    const editPhotoPlaceholder = document.getElementById('editPhotoPlaceholder');

    document.getElementById('editProfileBtn').onclick = () => {
      document.getElementById('editNameInput').value = currentProfileData.name || '';
      document.getElementById('editUsernameInput').value = currentProfileData.username || '';
      if (currentProfileData.photoURL){
        editPhotoPreview.src = currentProfileData.photoURL;
        editPhotoPreview.style.display = 'block';
        editPhotoPlaceholder.style.display = 'none';
      } else {
        editPhotoPreview.style.display = 'none';
        editPhotoPlaceholder.style.display = 'block';
      }
      editPhotoInput.value = '';
      editModal.classList.add('open');
    };

    document.getElementById('editCancelBtn').onclick = () => editModal.classList.remove('open');

    editPhotoInput.addEventListener('change', () => {
      const file = editPhotoInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        editPhotoPreview.src = e.target.result;
        editPhotoPreview.style.display = 'block';
        editPhotoPlaceholder.style.display = 'none';
      };
      reader.readAsDataURL(file);
    });

    // ---- Simple contact search ----
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      document.querySelectorAll('.contact').forEach(row => {
        const name = row.querySelector('.name').textContent.toLowerCase();
        row.style.display = name.includes(term) ? 'flex' : 'none';
      });
    });
  </script>

  <!-- ===== Firebase (requires the file to be served over http/https, not opened directly) ===== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore, collection, query, orderBy, onSnapshot,
      addDoc, doc, setDoc, getDocs, serverTimestamp, limit
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import {
      getStorage, ref, uploadBytes, getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    // =========================================================
    // 🔧 PASTE YOUR FIREBASE CONFIG HERE — must match login.html
    // =========================================================
        const firebaseConfig = {
      apiKey: "AIzaSyBE0CmXkQr_LV1YU7y1MpkKUrCr_i9ZD9E",
      authDomain: "sandesh-ff5ff.firebaseapp.com",
      databaseURL: "https://sandesh-ff5ff-default-rtdb.firebaseio.com",
      projectId: "sandesh-ff5ff",
      storageBucket: "sandesh-ff5ff.firebasestorage.app",
      messagingSenderId: "642211479662",
      appId: "1:642211479662:web:1eb6f4d34a61d076b3a67f",
      measurementId: "G-40WGJPN5ND"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // ---- Auth guard ----
    onAuthStateChanged(auth, (user) => {
      if (!user){
        window.location.href = "login.html";
        return;
      }
      currentUser = user;
      loadContacts();
    });

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(()=> window.location.href = "login.html");

    document.getElementById('editSaveBtn').onclick = async () => {
      const saveBtn = document.getElementById('editSaveBtn');
      const name = document.getElementById('editNameInput').value.trim();
      const username = document.getElementById('editUsernameInput').value.trim().replace(/^@/, '');
      if (!name || !username){ alert("Name and username can't be empty."); return; }

      saveBtn.disabled = true; saveBtn.textContent = "Saving...";
      try{
        let photoURL = currentProfileData.photoURL || "";
        const file = editPhotoInput.files[0];
        if (file){
          const photoRef = ref(storage, `profile_photos/${currentUser.uid}.jpg`);
          await uploadBytes(photoRef, file);
          photoURL = await getDownloadURL(photoRef);
        }
        await setDoc(doc(db, "users", currentUser.uid), {
          name, username, photoURL
        }, { merge: true });

        currentProfileData = { ...currentProfileData, name, username, photoURL };
        populateMyProfile();
        editModal.classList.remove('open');
      }catch(err){
        console.error(err);
        alert("Could not save profile. Check your Firebase config / Storage rules.");
      }finally{
        saveBtn.disabled = false; saveBtn.textContent = "Save";
      }
    };

    async function populateMyProfile(){
      try{
        const mySnap = await getDocs(query(collection(db, "users")));
        let myData = null;
        mySnap.forEach(d => { if (d.id === currentUser.uid) myData = d.data(); });
        currentProfileData = myData || {};
        document.getElementById('myName').textContent = myData?.name || currentUser.displayName || 'Unknown';
        document.getElementById('myHandle').textContent = '@' + (myData?.username || 'user');
        const avatarEl = document.getElementById('myAvatar');
        if (myData?.photoURL){ avatarEl.src = myData.photoURL; avatarEl.style.display = 'block'; }
        else { avatarEl.style.display = 'none'; }
      }catch(err){ console.error(err); }
    }

    // ---- Deterministic chat ID for a 1:1 conversation between two UIDs ----
    function chatIdFor(uidA, uidB){
      return [uidA, uidB].sort().join('_');
    }

    // ---- Load all other users from "users" collection (same collection your app writes to) ----
    async function loadContacts(){
      const list = document.getElementById('contactList');
      list.innerHTML = '<div style="padding:20px; color:#999; font-size:.85em;">Loading contacts…</div>';
      try{
        const snap = await getDocs(collection(db, "users"));
        list.innerHTML = '';
        snap.forEach(docSnap => {
          const u = docSnap.data();
          const uid = docSnap.id;
          if (uid === currentUser.uid) return; // skip self

          const row = document.createElement('div');
          row.className = 'contact';
          row.innerHTML = `
            <div class="avatar">${avatarInnerHtml(u)}<span class="dot ${u.online ? 'online' : ''}"></span></div>
            <div class="contact-meta">
              <div class="name">${u.name || 'Unknown'}</div>
              <div class="last-msg">@${u.username || 'user'}</div>
            </div>
          `;
          row.onclick = () => openChat(uid, u);
          list.appendChild(row);
        });
        if (list.innerHTML === '') list.innerHTML = '<div style="padding:20px; color:#999; font-size:.85em;">No other users yet.</div>';
      }catch(err){
        list.innerHTML = '<div style="padding:20px; color:#c0264a; font-size:.85em;">Could not load contacts. Check your Firebase config / Firestore rules.</div>';
        console.error(err);
      }
    }

    // ---- Open a 1:1 chat and listen for messages in real time ----
    window.openChat = function(otherUid, otherUser){
      activeContact = { uid: otherUid, ...otherUser };
      activeChatId = chatIdFor(currentUser.uid, otherUid);

      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('activeChat').style.display = 'flex';
      document.getElementById('chatAvatar').innerHTML = avatarInnerHtml(otherUser);
      document.getElementById('chatName').textContent = otherUser.name || 'Unknown';
      document.getElementById('chatStatus').textContent = otherUser.online ? 'online' : 'offline';

      document.querySelectorAll('.contact').forEach(c => c.classList.remove('active'));

      // mobile: hide sidebar, show back button
      if (window.innerWidth <= 800) document.getElementById('sidebar').classList.add('hide');

      if (unsubscribeMessages) unsubscribeMessages();

      // Ensure the chat "room" doc exists (adjust structure to match your app's schema if different)
      setDoc(doc(db, "chats", activeChatId), {
        participants: [currentUser.uid, otherUid],
        updatedAt: serverTimestamp()
      }, { merge: true });

      const messagesRef = collection(db, "chats", activeChatId, "messages");
      const q = query(messagesRef, orderBy("timestamp", "asc"), limit(200));

      unsubscribeMessages = onSnapshot(q, (snapshot) => {
        const box = document.getElementById('messages');
        box.innerHTML = '';
        snapshot.forEach(docSnap => {
          const m = docSnap.data();
          const mine = m.senderId === currentUser.uid;
          const bubble = document.createElement('div');
          bubble.className = 'bubble ' + (mine ? 'mine' : 'theirs');
          const time = m.timestamp?.toDate ? m.timestamp.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
          bubble.innerHTML = `${escapeHtml(m.text || '')}<span class="time">${time}</span>`;
          box.appendChild(bubble);
        });
        box.scrollTop = box.scrollHeight;
      }, (err) => {
        console.error(err);
      });
    };

    function escapeHtml(str){
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ---- Send a message ----
    window.sendMessage = async function(){
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text || !activeChatId) return;
      input.value = '';

      try{
        await addDoc(collection(db, "chats", activeChatId, "messages"), {
          senderId: currentUser.uid,
          text: text,
          timestamp: serverTimestamp()
        });
        await setDoc(doc(db, "chats", activeChatId), {
          lastMessage: text,
          updatedAt: serverTimestamp()
        }, { merge: true });
      }catch(err){
        console.error(err);
        alert("Message could not be sent. Check your Firebase config / Firestore rules.");
      }
    };

  </script>
